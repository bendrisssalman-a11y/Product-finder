<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Product Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-blue-600 text-white py-12 px-4 text-center">
        <h1 class="text-4xl font-bold mb-4">Smart Product Finder</h1>
        <p class="text-lg max-w-2xl mx-auto opacity-90">
            Tell us exactly what you need, and our smart engine will filter through the noise to find the perfect product for your lifestyle and budget.
        </p>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
        
        <aside class="md:col-span-1 space-y-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <h2 class="font-bold text-lg mb-4 text-gray-700">Filter Your Needs</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-2">Max Price ($)</label>
                    <input type="range" min="50" max="2000" value="1000" class="w-full" id="priceFilter">
                    <div class="text-right text-sm font-bold text-blue-600 mt-1" id="priceDisplay">$1000</div>
                </div>

                <div class="mb-4">
                    <h3 class="text-sm font-medium text-gray-600 mb-2">Category</h3>
                    <label class="flex items-center space-x-2 mb-2">
                        <input type="checkbox" class="rounded text-blue-600" checked>
                        <span class="text-sm text-gray-700">Laptops</span>
                    </label>
                    <label class="flex items-center space-x-2 mb-2">
                        <input type="checkbox" class="rounded text-blue-600">
                        <span class="text-sm text-gray-700">Audio</span>
                    </label>
                </div>

                <button class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded transition-colors">
                    Apply Filters
                </button>
            </div>

            <div class="bg-gray-200 h-64 rounded-lg flex items-center justify-center text-gray-500 border-2 border-dashed border-gray-300">
                Ad Space
            </div>
        </aside>

        <section class="md:col-span-3">
            
            <div class="flex gap-2 mb-8">
                <input type="text" id="searchInput" 
                    placeholder="e.g., Gaming laptop with good battery life under $1000..." 
                    class="flex-1 px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <button onclick="searchProducts()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition-colors shadow-sm">
                    Find Matches
                </button>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
            
        </section>
    </main>

    <script>
        // Real-time price slider update
        const priceFilter = document.getElementById('priceFilter');
        const priceDisplay = document.getElementById('priceDisplay');
        priceFilter.addEventListener('input', (e) => {
            priceDisplay.textContent = '$' + e.target.value;
        });

        // Upgraded Mock Data containing images and reviews
        const mockProducts = [
            {
                id: 1,
                name: "Acer Nitro 5 Gaming Laptop",
                price: 899.99,
                rating: 4.5,
                reviews: 1243,
                image: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?auto=format&fit=crop&w=400&q=80",
                description: "Perfect for budget 1080p gaming with a solid battery life."
            },
            {
                id: 2,
                name: "Lenovo Legion Slim 5",
                price: 1150.00,
                rating: 4.8,
                reviews: 892,
                image: "https://images.unsplash.com/photo-1593642632823-8f785ba67e45?auto=format&fit=crop&w=400&q=80",
                description: "Premium build, excellent cooling, runs slightly above budget."
            },
            {
                id: 3,
                name: "HyperX Cloud II Headset",
                price: 79.99,
                rating: 4.7,
                reviews: 15420,
                image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?auto=format&fit=crop&w=400&q=80",
                description: "Ultra-comfortable 7.1 surround sound gaming headset."
            }
        ];

        // Function to render products as rich cards
        function renderProducts(products) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = ''; // Clear current

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow";
                
                card.innerHTML = `
                    <div class="h-48 overflow-hidden bg-gray-100">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-lg text-gray-900 mb-1 truncate">${product.name}</h3>
                        <p class="text-sm text-gray-500 mb-3 h-10 overflow-hidden">${product.description}</p>
                        
                        <div class="flex items-center mb-4 text-sm">
                            <span class="text-yellow-400 mr-1">★★★★★</span>
                            <span class="text-gray-600 font-medium">${product.rating}</span>
                            <span class="text-gray-400 ml-1">(${product.reviews.toLocaleString()} reviews)</span>
                        </div>
                        
                        <div class="flex items-center justify-between mt-auto">
                            <span class="font-bold text-xl text-gray-900">$${product.price}</span>
                            <a href="#" class="text-blue-600 hover:text-blue-800 font-medium text-sm transition-colors">
                                View Deal →
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Simulate a search action
        function searchProducts() {
            // In a real app, this would fetch data from an API based on the filters
            // For now, it just re-renders the mock data to show it's working
            renderProducts(mockProducts);
        }

        // Initial render on page load
        renderProducts(mockProducts);
    </script>
</body>
</html>
