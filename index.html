<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Product Matchmaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-indigo-700 text-white py-12 px-4 text-center">
        <h1 class="text-4xl font-bold mb-4">Smart Product Matchmaker</h1>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4">
        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCDqiQrLu4um3uX9664x4U00gqvhfzNx7s",
            authDomain: "product-finder-53966.firebaseapp.com",
            projectId: "product-finder-53966",
            storageBucket: "product-finder-53966.firebasestorage.app",
            messagingSenderId: "415485248573",
            appId: "1:415485248573:web:1bf2189eb6f489850ad654"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadData() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const grid = document.getElementById('resultsGrid');
                grid.innerHTML = ''; // Clear loading state
                
                querySnapshot.forEach((doc) => {
                    const p = doc.data();
                    grid.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                            <h3 class="font-bold text-xl">${p.name || 'No Name'}</h3>
                            <p class="text-indigo-600 font-bold mt-2">$${p.price || '0'}</p>
                            <p class="text-sm text-slate-500">${p.category || 'General'}</p>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading products: ", error);
            }
        }

        loadData();
    </script>
</body>
</html>
